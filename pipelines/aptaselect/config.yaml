# =============================================================================
# AptaSelect Configuration
# =============================================================================

# Required: paths to paired-end FASTQ files (mounted at /input at runtime)
read1: "/input/test_1.fq"
read2: "/input/test_2.fq"

# --- Stage 1: Join ---
# Minimum overlap length (bp) for joining paired reads
min_overlap: 6
# Maximum mismatch rate allowed in the overlap region (0.0 - 1.0)
max_mismatch_rate: 0.08
# Short library mode: set true for short inserts, false for long inserts
short_mode: true

# --- Stages 2-4: Pattern matching ---
# Maximum mismatches allowed when matching patterns (applies to all stages)
pattern_mismatches: 1

# Stage 2: Selection Filtering patterns
selection_left_pattern: "CCACTTCTCCTTCCATCCTAAAC"
selection_right_pattern: "GAGTAGTTTGGAGGGTTGTCTG"

# Stage 3: 1st Sort Filtering patterns and required between-length
sort1_left_pattern: "TCCTAAAC"
sort1_right_pattern: "GAGTAGTT"
sort1_between_length: 40

# Stage 4: 2nd Sort Filtering patterns and required between-length
sort2_left_pattern: "TCTCTCTCTC"
sort2_right_pattern: "GAGAGAGAGA"
sort2_between_length: 20

# --- Stage 5: Aggregation ---
# Chunk size for parallel counting
chunk_size: 10000