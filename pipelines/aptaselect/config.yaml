# AptaSelect Pipeline Configuration
# ===================================

# Required: Paired-end FASTQ files (paths relative to /input mount point)
r1: "/input/test_1.fq"
r2: "/input/test_2.fq"

# Library mode: set long_mode to true for long library inserts
# Default is short mode (each read covers full insert + opposite adapter)
long_mode: false

# Stage 1: Join parameters
min_overlap: 6            # Minimum overlap length in bp
max_mismatch_pct: 0.08    # Maximum mismatch rate for overlap (8%)

# Pattern matching mismatch tolerance (applied to all stages)
max_mismatches: 1

# Stage 2: Selection Filtering patterns
sel_left: "CCACTTCTCCTTCCATCCTAAAC"
sel_right: "GAGTAGTTTGGAGGGTTGTCTG"

# Stage 3: 1st Sort Filtering patterns
sort1_left: "TCCTAAAC"
sort1_right: "GAGTAGTT"

# Stage 4: 2nd Sort Filtering patterns
sort2_left: "TCTCTCTCTC"
sort2_right: "GAGAGAGAGA"
sort2_between_length: 20  # Required between-length in bp

# Processing chunk size
chunk_size: 10000