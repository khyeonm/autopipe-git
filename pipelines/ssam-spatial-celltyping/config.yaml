# ─────────────────────────────────────────────────────────────────────────────
# Input mode: "zarr" or "csv"
# ─────────────────────────────────────────────────────────────────────────────
input_mode: "zarr"

# --- SpatialData zarr input (used when input_mode = "zarr") ---
# Path to .zarr store that contains:
#   points/transcripts  -> mRNA molecule coordinates (x, y, feature_name)
#   tables/table        -> AnnData with obs/celltype annotation
zarr: "/input/Human_Breast_S1_Mid_celltype_crop_3.zarr"

# --- CSV input (used when input_mode = "csv") ---
# coordinates: "/input/coordinates.csv"   # columns: gene, x, y
# signatures:  "/input/signatures.csv"    # rows: cell types, columns: genes
coordinates: "/input/coordinates.csv"
signatures:  "/input/signatures.csv"

# ─────────────────────────────────────────────────────────────────────────────
# KDE bandwidth in micrometers (controls smoothing; 2.5 ≈ 10 µm FWTM)
bandwidth: 2.5

# Expression threshold — pixels below this fraction are discarded
threshold: 0.2

# Output map width in pixels
map_width: 2000

# Number of threads
threads: 4