# ============================================================
# Bulk RNA-seq Preprocessing Pipeline Configuration
# Uses nf-core/rnaseq with STAR-Salmon workflow
# ============================================================

# nf-core/rnaseq version
nfcore_rnaseq_version: "3.22.2"

# ----------------------------------------------------------
# Genome & Reference Configuration
# ----------------------------------------------------------
# Set genome to null since we provide custom references
genome: "null"

# iGenomes base path. Set to "null" to disable iGenomes.
igenomes_base: "null"

# Custom reference files for Mus musculus (GRCm39)
fasta: "/input/Mus_musculus.GRCm39.dna_sm.primary_assembly.fa.gz"
gtf: "/input/Mus_musculus.GRCm39.113.gtf.gz"
star_index: ""
salmon_index: ""

# ----------------------------------------------------------
# Trimming
# ----------------------------------------------------------
# Trimmer to use: "trimgalore" (default) or "fastp"
trimmer: "trimgalore"

# Minimum number of trimmed reads required to pass filtering
min_trimmed_reads: 10000

# ----------------------------------------------------------
# Resource Limits
# ----------------------------------------------------------
# Maximum CPUs per process
max_cpus: 16

# Maximum memory per process (Nextflow format)
max_memory: "64.GB"

# Maximum wall time per process (Nextflow format)
max_time: "240.h"

# Threads for Snakemake rule
threads: 16

# ----------------------------------------------------------
# Extra Parameters
# ----------------------------------------------------------
# Additional nf-core/rnaseq parameters (appended to command)
extra_params: ""