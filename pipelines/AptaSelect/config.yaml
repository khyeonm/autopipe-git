# ── Input files (Docker mount points) ─────────────────────────────────────────
r1: "/input/read1.fastq.gz"    # Path to Read 1 FASTQ (gzipped or plain)
r2: "/input/read2.fastq.gz"    # Path to Read 2 FASTQ (gzipped or plain)

# ── Stage 1: Join parameters ──────────────────────────────────────────────────
min_overlap: 6         # Minimum overlap length in bp
pct_diff: 8            # Maximum mismatch % in overlap region
is_short: "true"       # "true" = short library mode (insert shorter than read length)

# ── Stage 2: Selection Filtering patterns ─────────────────────────────────────
sel_read1: "CCACTTCTCCTTCCATCCTAAAC"   # Selection left pattern
sel_read2: "GAGTAGTTTGGAGGGTTGTCTG"    # Selection right pattern

# ── Stage 3: 1st Sort Filtering patterns ──────────────────────────────────────
s1_read1: "TCCTAAAC"    # 1st Sort left pattern  (suffix of sel_read1)
s1_read2: "GAGTAGTT"    # 1st Sort right pattern (prefix of sel_read2)
s1_length: 40           # Required length between S1 patterns (bp)

# ── Stage 4: 2nd Sort Filtering patterns ──────────────────────────────────────
s2_read1: "TCTCTCTCTC"  # 2nd Sort left pattern
s2_read2: "GAGAGAGAGA"  # 2nd Sort right pattern
s2_length: 20           # Required length between S2 patterns (bp)

# ── Shared filtering parameter ────────────────────────────────────────────────
max_mismatches: 1       # Max mismatches allowed per pattern match

# ── Stage 5: Aggregation & Ranking ────────────────────────────────────────────
top_n: 10               # Number of top aptamer candidates to report
chunk_size: 10000       # Records per parallel chunk