# Required: AnnData file mounted inside /input.
input_h5ad: "/input/sample.h5ad"

# Required: observation column in adata.obs used to define groups for DEG.
groupby: "cell_type"

# DEG settings. reference can be "rest" or a category from the groupby column.
method: "wilcoxon"
reference: "rest"
use_raw: false
layer: ""
min_cells: 3
n_top_genes: 25

# Preprocessing settings applied before DEG when requested.
normalize_total: true
target_sum: 10000
log1p: true

# Squidpy spatial settings. If adata.obsm['spatial'] is present, the pipeline
# computes neighborhood enrichment and spatial autocorrelation tables.
spatial_coord_type: "generic"
spatial_library_key: ""
spatial_radius: ""
spatial_n_neighs: 6
spatial_autocorr_genes: 100

# Runtime settings.
threads: 4