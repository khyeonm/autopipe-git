# =============================================================================
#  config.yaml — 10X snMultiome Pipeline (Gastric WNT / RZ vs RZK)
# =============================================================================
# Species: "mouse" or "human"
species: "mouse"

# ------ Input data paths (Docker mount points) ------
# Wild-type sample
wild_type:
  h5:       "/input/Mouse_RZ_WEN/filtered_feature_bc_matrix.h5"
  fragments: "/input/Mouse_RZ_WEN/atac_fragments.tsv.gz"
  metadata:  "/input/Mouse_RZ_WEN/per_barcode_metrics.csv"

# Mutant sample (Kras mutant)
mutant:
  h5:       "/input/Mouse_RZK_WEN/filtered_feature_bc_matrix.h5"
  fragments: "/input/Mouse_RZK_WEN/atac_fragments.tsv.gz"
  metadata:  "/input/Mouse_RZK_WEN/per_barcode_metrics.csv"

# ------ QC thresholds ------
qc:
  nCount_ATAC_max: 100000
  nCount_RNA_max:  25000
  nCount_ATAC_min: 1000
  nCount_RNA_min:  1000
  nucleosome_signal_max: 2
  TSS_enrichment_min: 1
  percent_mt_max: 15

# ------ Processing parameters ------
processing:
  nfeatures_vst: 2000          # number of variable features for RNA
  atac_min_cutoff: "q0"        # FindTopFeatures cutoff for ATAC
  chromatin_assay_min_cells: 10

# ------ Clustering & UMAP ------
clustering:
  npcs: 30                     # PCA dimensions
  dims_start: 1
  dims_end: 30
  resolution_initial: 0.3      # initial clustering resolution
  resolution_refined: 0.6      # refined clustering for cell-type splitting
  algorithm: 1                 # Louvain

# ------ Differential expression ------
de:
  test_use: "MAST"             # DE test method
  padj_threshold: 0.01
  log2fc_threshold: 1.0

# ------ Differential accessibility ------
da:
  min_pct: 0.05
  logfc_threshold: 0.1
  test_use: "LR"
  latent_vars: "atac_peak_region_fragments"
  padj_threshold: 0.005

# ------ Motif enrichment ------
motif:
  jaspar_collection: "CORE"
  jaspar_tax_group: "vertebrates"
  enriched_padj: 0.05

# ------ Marker genes for DotPlot ------
marker_genes:
  - "Lgr5"
  - "Glipr1"
  - "Cd44"
  - "Cftr"
  - "Muc6"
  - "Mki67"
  - "Foxm1"
  - "Hmgb2"
  - "Top2a"
  - "Smc2"
  - "Gkn1"
  - "Tff1"
  - "Gkn2"
  - "Muc5ac"
  - "Wnt7b"

# ------ Feature plot genes with min/max cutoffs ------
feature_plot_genes:
  - { gene: "Muc5ac",  min: 0, max: 3 }
  - { gene: "Gkn2",    min: 0, max: 3 }
  - { gene: "Tff1",    min: 0.5, max: 6 }
  - { gene: "Gkn1",    min: 0.5, max: 5 }
  - { gene: "Smc2",    min: 0.5, max: 3 }
  - { gene: "Top2a",   min: 0.5, max: 4 }
  - { gene: "Hmgb2",   min: 1, max: 4 }
  - { gene: "Foxm1",   min: 0, max: 2 }
  - { gene: "Mki67",   min: 0.3, max: 3 }
  - { gene: "Muc6",    min: 0.3, max: 4.5 }
  - { gene: "Cftr",    min: 0.5, max: 3.5 }
  - { gene: "Cd44",    min: 2, max: 4.2 }
  - { gene: "Glipr1",  min: 1.5, max: 4.5 }
  - { gene: "Lgr5",    min: 0.5, max: 3.5 }

# ------ Wnt genes for violin plot ------
wnt_genes:
  - "Wnt1"
  - "Wnt2"
  - "Wnt2b"
  - "Wnt3"
  - "Wnt3a"
  - "Wnt4"
  - "Wnt5a"
  - "Wnt5b"
  - "Wnt6"
  - "Wnt7a"
  - "Wnt7b"
  - "Wnt8a"
  - "Wnt8b"
  - "Wnt9a"
  - "Wnt9b"
  - "Wnt10a"
  - "Wnt10b"
  - "Wnt11"
  - "Wnt16"

# ------ Cell type labels ------
cell_types:
  "0": "Neck"
  "1": "Lgr5+"
  "2": "SPEM"
  "3": "Wnt7+"
  "4": "Proliferating"
  "5": "Pre-Pit"
  "6": "Pit"

# ------ Cluster colors ------
cluster_colors:
  "Neck":          "#8936EF"
  "Lgr5+":         "#F2CA19"
  "SPEM":          "#FF00BD"
  "Wnt7+":         "#E11845"
  "Proliferating": "#0057E9"
  "Pre-Pit":       "#87E911"
  "Pit":           "#018300"

# ------ MACS2 path inside container ------
macs2_path: "/opt/conda/envs/pipeline/bin/macs2"

# ------ Parallelism ------
workers: 20
max_ram_gb: 80

# ------ Random seed ------
seed: 1234

# ------ Wnt7b genomic regions for ATAC enrichment testing ------
wnt7b_regions:
  - "chr15-85568400-85569900"
  - "chr15-85574150-85575200"

# ------ Target gene for coverage/linkage plot ------
linkage_target_gene: "Wnt7b"